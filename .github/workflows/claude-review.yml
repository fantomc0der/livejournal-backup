name: Claude PR Review
on:
  pull_request:
    types: [synchronize, ready_for_review]

jobs:
  review:
    # `synchronize` fires on pushes to draft PRs too, so the draft guard still matters.
    # `opened` is intentionally absent: `enforce-draft.yml` converts every non-draft PR to a draft on open, but both workflows fire in parallel from the same event.
    #  Claude Review would see `draft == false` in its frozen payload and run anyway. Relying on `ready_for_review` sidesteps the race entirely.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      # Pinned to v1.0.88 (released 2026-04-04) — the release immediately before the regression.
      # v1.0.89 (2026-04-05) introduced a snapshot step that calls fs.cpSync without
      # dereference:true on sensitive paths (CLAUDE.md, .claude/, .mcp.json, .gitmodules, ...),
      # which crashes with `ENOENT: no such file or directory, symlink` when any of those paths
      # is a git symlink. CLAUDE.md here is a symlink to AGENTS.md, so every release from v1.0.89
      # through at least v1.0.105 is broken for this repo.
      #
      # Bug:  https://github.com/anthropics/claude-code-action/issues/1187
      # Fix:  https://github.com/anthropics/claude-code-action/pull/1186  (open, unmerged as of 2026-04-24)
      #
      # Bump to the first release that contains PR #1186 once it merges (expected v1.0.106+).
      - uses: anthropics/claude-code-action@v1.0.88
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          base_branch: ${{ github.event.pull_request.base.ref }}
          # Required for use_sticky_comment to work alongside `prompt:` — see https://github.com/anthropics/claude-code-action/issues/1108
          track_progress: true
          use_sticky_comment: true
          include_fix_links: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request with focus on:
            - Code quality and correctness
            - Potential bugs or regressions
            - Adherence to the rules in CLAUDE.md (especially the Hard Rules section)
            - Test coverage for behavior changes

            Use inline comments for specific code issues. Post exactly one top-level summary comment.

            The final line of your summary comment MUST be one of these verdicts, on its own line, with no surrounding punctuation or formatting:
            - `REVIEW: PASS` — the PR is ready to merge
            - `REVIEW: FAIL` — the PR needs changes before merge

            Be strict: if you found any bug, missing test, or Hard Rule violation, use FAIL.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
