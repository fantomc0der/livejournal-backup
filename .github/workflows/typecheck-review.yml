name: TypeScript Review
on: [pull_request]
jobs:
  annotate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - id: tsc
        run: |
          output=$(bun run typecheck 2>&1) || true
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash
      - uses: actions/github-script@v7
        env:
          TSC_OUTPUT: ${{ steps.tsc.outputs.output }}
        with:
          script: |
            const crypto = require('crypto');
            const marker = '<!-- typecheck-review -->';
            const raw = process.env.TSC_OUTPUT || '';
            const sha = context.payload.pull_request.head.sha;
            const prUrl = context.payload.pull_request.html_url;
            const repoSlug = `${context.repo.owner}/${context.repo.repo}`;

            // GitHub PR diff anchors are `diff-<sha256(filepath)>`
            const diffAnchor = (path) =>
              `diff-${crypto.createHash('sha256').update(path).digest('hex')}`;

            // Wrap single-quoted segments in backticks so types like 'string | undefined' render as code.
            const codifyQuotes = (text) => text.replace(/'([^']+)'/g, '`$1`');

            const errorRe = /^(.+?)\((\d+),(\d+)\): error (TS\d+): (.+)$/;
            const rawErrors = [];
            let current = null;
            for (const line of raw.split('\n')) {
              if (line.startsWith('$ ')) continue; // bun command echo
              const m = line.match(errorRe);
              if (m) {
                current = {
                  file: m[1],
                  line: Number(m[2]),
                  col: Number(m[3]),
                  code: m[4],
                  message: m[5],
                  details: [],
                };
                rawErrors.push(current);
              } else if (current && line.trim()) {
                current.details.push(line.trim());
              }
            }

            // Merge identical errors (same file/line/code/message/details). tsc legitimately reports
            // the same diagnostic twice when the problem token appears twice on one line (and again
            // when multiple tsconfigs share a file), so collapse them with a ×N count to stop the
            // comment looking like a dedup bug.
            const errors = [];
            const seen = new Map();
            for (const e of rawErrors) {
              const key = `${e.file}|${e.line}|${e.code}|${e.message}|${e.details.join('\n')}`;
              const hit = seen.get(key);
              if (hit) {
                hit.count++;
              } else {
                const entry = { ...e, count: 1 };
                seen.set(key, entry);
                errors.push(entry);
              }
            }
            const rawCount = rawErrors.length;

            let body;
            if (errors.length === 0) {
              body = `${marker}\n### TypeScript Review\n:white_check_mark: No TypeScript errors were found in these changes`;
            } else {
              const byFile = new Map();
              for (const e of errors) {
                if (!byFile.has(e.file)) byFile.set(e.file, []);
                byFile.get(e.file).push(e);
              }
              const errWord = rawCount === 1 ? 'error' : 'errors';
              const fileWord = byFile.size === 1 ? 'file' : 'files';
              const parts = [
                marker,
                `### TypeScript Review`,
                `:x: Found ${rawCount} ${errWord} across ${byFile.size} ${fileWord}`,
                '',
              ];
              for (const [file, errs] of byFile) {
                const fileHref = `${prUrl}/files#${diffAnchor(file)}`;
                const fileTotal = errs.reduce((n, e) => n + e.count, 0);
                const countLabel = `${fileTotal} ${fileTotal === 1 ? 'error' : 'errors'}`;
                parts.push(`<details open><summary>📄 <a href="${fileHref}">${file}</a> — ${countLabel}</summary>`);
                parts.push('');
                for (const e of errs) {
                  const lineHref = `https://github.com/${repoSlug}/blob/${sha}/${file}#L${e.line}`;
                  const message = codifyQuotes(e.message);
                  const dupTag = e.count > 1 ? ` ×${e.count}` : '';
                  parts.push(`- **${e.code}** ([on L${e.line}](${lineHref})${dupTag}) — ${message}`);
                  for (const d of e.details) {
                    parts.push(`  - ${codifyQuotes(d)}`);
                  }
                }
                parts.push('');
                parts.push('</details>');
                parts.push('');
              }
              body = parts.join('\n').trimEnd();
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
