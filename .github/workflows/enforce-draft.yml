name: Enforce Draft on New PR
on:
  pull_request:
    types: [opened]

jobs:
  enforce-draft:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          pr_node_id=$(gh pr view "$PR" --repo "$REPO" --json id --jq '.id')
          gh api graphql -f query='
            mutation($id: ID!) {
              convertPullRequestToDraft(input: {pullRequestId: $id}) {
                pullRequest { isDraft }
              }
            }
          ' -f id="$pr_node_id"
          gh pr comment "$PR" --repo "$REPO" --body "Auto-converted to draft. Mark as **Ready for Review** when the PR is finished — that will trigger Claude review and the auto-merge gate."
